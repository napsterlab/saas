<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — CIE Gestion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1B3A6B 0%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px 36px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-logo .logo-badge {
      width: 60px;
      height: 60px;
      background: #E8A020;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: #fff;
      letter-spacing: -1px;
    }
    .login-logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      color: #1B3A6B;
      margin-top: 12px;
    }
    .login-logo p {
      color: #6B7280;
      font-size: 13px;
      margin-top: 4px;
    }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1A1A2E;
      margin-bottom: 5px;
    }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-control:focus {
      border-color: #1B3A6B;
      box-shadow: 0 0 0 3px rgba(27,58,107,0.1);
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #1B3A6B;
      color: #fff;
    }
    .btn-primary:hover {
      background: #2a5298;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(27,58,107,0.3);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .register-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #6B7280;
    }
    .register-link a {
      color: #1B3A6B;
      font-weight: 600;
      text-decoration: none;
    }
    .register-link a:hover { text-decoration: underline; }
    .error-msg {
      color: #E74C3C;
      font-size: 13px;
      margin-top: 8px;
      display: none;
      padding: 10px;
      background: #FEE2E2;
      border-radius: 6px;
      text-align: center;
    }
    .success-msg {
      color: #16A34A;
      font-size: 13px;
      margin-top: 8px;
      display: none;
      padding: 10px;
      background: #DCFCE7;
      border-radius: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <div class="logo-badge">CIE</div>
      <h1>Gestion Commerciale</h1>
      <p>Connectez-vous à votre espace</p>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>
      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>
      <button type="submit" class="btn btn-primary" id="login-btn">Se connecter</button>
    </form>

    <div class="register-link">
      Pas encore de compte ? <a href="register.html">Créer une société</a>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Connexion...';

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Erreur de connexion');
        }

        // Stocker le token
        localStorage.setItem('cie_token', data.token);
        localStorage.setItem('cie_user', JSON.stringify(data.user));

        successEl.textContent = '✅ Connexion réussie ! Redirection...';
        successEl.style.display = 'block';

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);

      } catch (err) {
        errorEl.textContent = '❌ ' + err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
